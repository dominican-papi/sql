<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas WCA - República Dominicana</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        h1 { color: #333; text-align: center; }
        
        .menu-botones { text-align: center; margin-bottom: 25px; }
        .btn-query { 
            background-color: #2c3e50; color: white; border: none; 
            padding: 10px 15px; margin: 5px; border-radius: 5px; 
            cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s;
        }
        .btn-query:hover { background-color: #e74c3c; }
        
        table { width: 85%; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #2c3e50; color: white; text-transform: uppercase; font-size: 13px; }
        tr:hover { background-color: #f1f1f1; }
        .destacado { font-weight: bold; color: #e74c3c; }
        .oro { color: #d4af37; font-weight: bold; }
        .plata { color: #c0c0c0; font-weight: bold; }
        .bronce { color: #cd7f32; font-weight: bold; }
    </style>
</head>
<body>

    <h1 id="titulo-tabla">Rankings WCA 🇩🇴</h1>
    
    <div class="menu-botones">
        <button class="btn-query" onclick="cargarDatos('datos/top_333.json', 'Top 50 - 3x3x3 Single', 'tiempo')">3x3 Single</button>
        <button class="btn-query" onclick="cargarDatos('datos/medallas.json', 'Top 50 - Colección de Medallas', 'medallas')">Medallas</button>
        <button class="btn-query" onclick="cargarDatos('datos/sor_single.json', 'Top 50 - Sum of Ranks (Single)', 'sor')">Sum of Ranks</button>
        <button class="btn-query" onclick="cargarDatos('datos/kinch_nr.json', 'Top 50 - Kinch Ranks (NR)', 'kinch')">Kinch Ranks</button>
    </div>

    <table>
        <thead id="tabla-cabecera">
            </thead>
        <tbody id="tabla-cuerpo">
            </tbody>
    </table>

    <script>
        function cargarDatos(archivoJson, tituloNuevo, tipoDatos) {
            document.getElementById('titulo-tabla').innerText = tituloNuevo + ' 🇩🇴';
            const thead = document.getElementById('tabla-cabecera');
            const tbody = document.getElementById('tabla-cuerpo');
            
            tbody.innerHTML = '<tr><td colspan="10">Buscando la grasa...</td></tr>';

            // Configurar las cabeceras según el botón
            if (tipoDatos === 'tiempo') {
                thead.innerHTML = '<tr><th>Rango</th><th>WCA ID</th><th>Nombre</th><th>Mejor Tiempo</th></tr>';
            } else if (tipoDatos === 'medallas') {
                thead.innerHTML = '<tr><th>Rango</th><th>WCA ID</th><th>Nombre</th><th>🥇 Oro</th><th>🥈 Plata</th><th>🥉 Bronce</th><th>Total</th></tr>';
            } else if (tipoDatos === 'sor') {
                thead.innerHTML = '<tr><th>Rango</th><th>WCA ID</th><th>Nombre</th><th>Puntos SoR</th><th>Eventos Jugados</th></tr>';
            } else if (tipoDatos === 'kinch') {
                thead.innerHTML = '<tr><th>Rango</th><th>WCA ID</th><th>Nombre</th><th>Score Kinch</th><th>Eventos Jugados</th></tr>';
            }

            fetch(archivoJson)
                .then(response => {
                    if (!response.ok) throw new Error('Archivo no encontrado');
                    return response.json();
                })
                .then(data => {
                    tbody.innerHTML = ''; 
                    
                    data.forEach((filaData, index) => {
                        // Resaltar tu WCA ID
                        // let estiloFila = filaData.wca_id === '2018PENA01' ? 'background-color: #d1ecf1;' : '';
                        // let filaHTML = `<tr style="${estiloFila}"><td>${index + 1}</td><td>${filaData.wca_id}</td><td style="text-align: left;">${filaData.nombre}</td>`;
                        
                        // Llenar los datos según el tipo de tabla
                        if (tipoDatos === 'tiempo') {
                            let tiempoSegundos = (filaData.mejor_single / 100).toFixed(2);
                            filaHTML += `<td class="destacado">${tiempoSegundos}</td>`;
                        } 
                        else if (tipoDatos === 'medallas') {
                            filaHTML += `<td class="oro">${filaData.Golds}</td><td class="plata">${filaData.Silvers}</td><td class="bronce">${filaData.Bronzes}</td><td class="destacado">${filaData.Total}</td>`;
                        }
                        else if (tipoDatos === 'sor') {
                            filaHTML += `<td class="destacado">${filaData.sor_single}</td><td>${filaData.Eventos}</td>`;
                        }
                        else if (tipoDatos === 'kinch') {
                            filaHTML += `<td class="destacado">${filaData.kinch_score}</td><td>${filaData.eventos_jugados}</td>`;
                        }
                        
                        filaHTML += `</tr>`;
                        tbody.innerHTML += filaHTML;
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    tbody.innerHTML = `<tr><td colspan="10" style="color: red;">Bobo: No se encontró <b>${archivoJson}</b>. Asegúrate de que el Action terminó de correr.</td></tr>`;
                });
        }

        // Cargar por defecto la primera tabla al entrar
        window.onload = () => { cargarDatos('datos/top_333.json', 'Top 50 - 3x3x3 Single', 'tiempo'); };
    </script>

</body>
</html>
