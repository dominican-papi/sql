<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas WCA - República Dominicana</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        h1 { color: #333; text-align: center; }
        table { width: 80%; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #2c3e50; color: white; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }
        .tiempo { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

    <h1>Top 50 - Single 3x3x3 🇩🇴</h1>
    
    <table>
        <thead>
            <tr>
                <th>Rango</th>
                <th>WCA ID</th>
                <th>Nombre</th>
                <th>País</th>
                <th>Mejor Single</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            </tbody>
    </table>

    <script>
        // Hacemos la petición para buscar tu archivo JSON en la carpeta datos
        fetch('datos/top_333.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('tabla-cuerpo');
                
                // Limpiamos cualquier texto previo ("Cargando...")
                tbody.innerHTML = '';
                
                // Recorremos cada competidor que nos trajo el JSON
                data.forEach((competidor, index) => {
                    // Los tiempos de la WCA vienen sin el punto decimal (ej: 444 = 4.44s)
                    let tiempoSegundos = (competidor.mejor_single / 100).toFixed(2);
                    
                    let fila = `<tr>
                        <td>${index + 1}</td>
                        <td>${competidor.wca_id}</td>
                        <td style="text-align: left;">${competidor.nombre}</td>
                        <td>República Dominicana</td>
                        <td class="tiempo">${tiempoSegundos}</td>
                    </tr>`;
                    
                    tbody.innerHTML += fila;
                });
            })
            .catch(error => {
                console.error('Error cargando el JSON:', error);
                document.getElementById('tabla-cuerpo').innerHTML = '<tr><td colspan="5" style="color: red;">Bobo cargando los datos. Verifica el Action de GitHub.</td></tr>';
            });
    </script>

</body>
</html>
